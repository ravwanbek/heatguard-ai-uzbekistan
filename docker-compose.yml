services:
  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
  dashboard:
    build: .
    command: streamlit run app/dashboard/main.py --server.address=0.0.0.0 --server.port=8501
    env_file: .env
    ports:
      - "8501:8501"
    restart: unless-stopped
